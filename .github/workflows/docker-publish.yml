name: Build & Publish Docker image (GHCR)

# Mỗi lần push lên main → build image Docker và đẩy lên GitHub Container Registry
# (ghcr.io/blogminhquy/javis-os). Hostinger Docker Manager / VPS chỉ cần PULL image này.
on:
  push:
    branches: [main]
    # Chỉ bỏ qua build khi push THUẦN tài liệu (không ảnh hưởng image).
    # CLAUDE.md là system prompt nạp vào image → KHÔNG ignore, để sửa nó là build lại.
    paths-ignore:
      - "README.md"
      - "DEPLOY.md"
      - ".learn/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

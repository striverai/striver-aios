# ============================================================================
# Jarvis OS - HOSTINGER VPS (Docker Manager). Bản này DEPLOY LÀ CHẠY, không kén hạ tầng.
#
# Mặc định: 1 container jarvis, vào bằng nút "Open" của Docker Manager (cổng 7777).
# KHÔNG có Watchtower (tránh "Partially running"). KHÔNG phụ thuộc mạng/hạ tầng ngoài
# (tránh lỗi "network ... not found" làm không deploy được).
#
# CÁCH DÙNG:
#   1) Docker Manager > Compose > URL > dán:
#      https://raw.githubusercontent.com/blogminhquy/jarvis-os/main/docker-compose.hostinger.yml
#   2) Deploy > bấm "Open" để vào > tạo tài khoản admin.
#   (Image GHCR phải để PUBLIC: GitHub > Packages > jarvis-os > Package settings > Public.)
#
#   CẬP NHẬT bản mới: vào project > Redeploy/Recreate (image :latest + pull_policy: always tự kéo bản mới).
#   Dữ liệu nằm trong volume nên không mất.
#
# >>> MUỐN TÊN MIỀN RIÊNG + HTTPS (bỏ :7777): xem 2 CÁCH ở CUỐI file. <<<
# ============================================================================
services:
  jarvis:
    image: ghcr.io/blogminhquy/jarvis-os:latest
    container_name: jarvis
    restart: unless-stopped
    pull_policy: always
    environment:
      JARVIS_HOST: 0.0.0.0
      JARVIS_PORT: "7777"
      JARVIS_REQUIRE_LOGIN: "1"     # ÉP đăng nhập/đăng ký khi mở app (public)
      JARVIS_STATE_DIR: /data/state
      BRAIN_PATH: /data/brain
      BRAINS_DIR: /brains
      OBSIDIAN_VAULT_PATH: /data/vault
      CLAUDE_CWD: /app
    ports:
      - "7777:7777"                 # vào bằng http://<ip-vps>:7777 hoặc nút Open của Hostinger
    volumes:
      - jarvis-data:/data
      - jarvis-brains:/brains
      - claude-auth:/home/jarvis/.claude
      - codex-auth:/home/jarvis/.codex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.getenv('JARVIS_PORT','7777')+'/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  jarvis-data:
  jarvis-brains:
  claude-auth:
  codex-auth:

# ============================================================================
# TÊN MIỀN RIÊNG + HTTPS trên Hostinger (KHÔNG bắt buộc - chọn 1 trong 2):
#
# CÁCH 1 (DỄ, khuyên dùng): để Hostinger gán tên miền cho project.
#   1) Trỏ DNS: bản ghi  A  <tên miền của bạn>  ->  <IP VPS>.
#   2) Trong hPanel > VPS > Docker Manager, mở project jarvis-os, tìm phần gán/đổi tên miền
#      (Domain / Access) rồi nhập tên miền của bạn. Hostinger tự lo Traefik + SSL, KHÔNG cần sửa file này.
#      (Hướng dẫn: hostinger.com > tìm "change the domain of a Docker project".)
#
# CÁCH 2 (THỦ CÔNG, chỉ khi VPS đã có Traefik mạng tên "traefik-proxy" - vd đang chạy app Catalog
#         như n8n/Hermes): sửa service jarvis ở trên như sau
#   - XOÁ khối "ports: - 7777:7777"  và THAY bằng:
#       expose:
#         - "7777"
#       labels:
#         - traefik.enable=true
#         - traefik.docker.network=traefik-proxy
#         - traefik.http.routers.jarvis.rule=Host(`javis.minhquy.vn`)   # đổi thành tên miền của bạn
#         - traefik.http.routers.jarvis.entrypoints=websecure
#         - traefik.http.routers.jarvis.tls.certresolver=letsencrypt
#         - traefik.http.services.jarvis.loadbalancer.server.port=7777
#       networks:
#         - traefik-proxy
#   - THÊM ở cuối file:
#       networks:
#         traefik-proxy:
#           external: true
#   Lưu ý: tên mạng "traefik-proxy", entrypoint "websecure", certresolver "letsencrypt" phải KHỚP
#   Traefik trên VPS của bạn; sai tên -> deploy lỗi hoặc không cấp được chứng chỉ. Trỏ DNS trước.
# ============================================================================

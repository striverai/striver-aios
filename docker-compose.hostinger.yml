# ============================================================================
# Javis OS - HOSTINGER VPS (Docker Manager). Tên miền + HTTPS qua Traefik có sẵn của Hostinger.
#
# File này LUÔN deploy được:
#   - Chưa đặt DOMAIN_NAME  -> chạy tạm, vào bằng nút Open / http://<ip>:7777 (chưa có HTTPS).
#   - Đặt DOMAIN_NAME       -> Traefik của Hostinger tự cấp HTTPS cho tên miền đó.
#
# CÁCH DÙNG:
#   1) Docker Manager > Compose > URL > dán:
#      https://raw.githubusercontent.com/blogminhquy/javis-os/main/docker-compose.hostinger.yml
#   2) Ô Environment (Biến môi trường) đặt DOMAIN_NAME (để có HTTPS):
#        - Link miễn phí (KHÔNG cần mua tên miền):  DOMAIN_NAME=javis.<hostname-vps>.hstgr.cloud
#          (hostname xem ở hPanel > VPS, vd: DOMAIN_NAME=javis.srv1782015.hstgr.cloud)
#        - Hoặc tên miền riêng:  DOMAIN_NAME=tenmien.com  (trỏ DNS A về IP VPS trước).
#   3) Deploy > đợi 1-3 phút Traefik cấp SSL > mở  https://<DOMAIN_NAME>.
#
# KHÔNG tìm thấy ô Environment? Bấm Manage > sửa .yaml, đổi thẳng dòng Host(...) thành tên miền:
#      Host(`javis.srv1782015.hstgr.cloud`)   (thay bằng hostname VPS của bạn).
#
# GHI CHÚ:
#   - Mấu chốt (rút từ compose thật của Hermes): KHÔNG khai báo networks - Traefik tự thấy container qua nhãn.
#   - Cập nhật bản mới: Redeploy trong Docker Manager (image :latest + pull_policy: always).
#   - VPS KHÔNG phải Hostinger: bỏ file này, dùng docker-compose.yml + docker-compose.https.yml (Caddy).
#   - Image GHCR phải để PUBLIC (GitHub > Packages > javis-os > Package settings > Public).
# ============================================================================
services:
  javis:
    image: ghcr.io/blogminhquy/javis-os:latest
    container_name: javis
    restart: unless-stopped
    pull_policy: always
    environment:
      JAVIS_HOST: 0.0.0.0
      JAVIS_PORT: "7777"
      JAVIS_REQUIRE_LOGIN: "1"     # ÉP đăng nhập/đăng ký khi mở app (public)
      JAVIS_STATE_DIR: /data/state
      BRAIN_PATH: /data/brain
      BRAINS_DIR: /brains
      OBSIDIAN_VAULT_PATH: /data/vault
      CLAUDE_CWD: /app
    ports:
      - "7777:7777"                 # đường vào dự phòng (nút Open / http://<ip>:7777)
    labels:
      # Tên router/service = ${COMPOSE_PROJECT_NAME} → chạy nhiều bản trên cùng VPS không đụng nhau.
      # Host = ${DOMAIN_NAME}; chưa đặt thì mặc định "localhost" (deploy vẫn chạy, chỉ chưa có domain/HTTPS).
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.rule=Host(`${DOMAIN_NAME:-localhost}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-javis}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-javis}.loadbalancer.server.port=7777
    volumes:
      - javis-data:/data
      - javis-brains:/brains
      - claude-auth:/home/javis/.claude
      - codex-auth:/home/javis/.codex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.getenv('JAVIS_PORT','7777')+'/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  javis-data:
  javis-brains:
  claude-auth:
  codex-auth:

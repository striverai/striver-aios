# ============================================================================
# Auto-HTTPS bằng Caddy + Let's Encrypt — cho VPS có TÊN MIỀN riêng.
# (KHÔNG dùng cho Hostinger Docker Manager: cổng 80/443 đã bị proxy Hostinger chiếm
#  → trên Hostinger hãy dùng HTTPS sẵn của họ, xem DEPLOY.md.)
#
#   1) Trỏ DNS tên miền về IP VPS:  bản ghi A:  jarvis.tencuaban.com → <ip-vps>
#   2) Chạy (đặt DOMAIN của bạn):
#        DOMAIN=jarvis.tencuaban.com docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
#   → Caddy TỰ xin chứng chỉ + gia hạn. Mở https://jarvis.tencuaban.com (HTTPS thật, cookie an toàn).
#
# Lưu ý: cổng 7777 (HTTP) vẫn mở nhưng đã chặn bằng đăng nhập. Muốn đóng hẳn, chặn firewall:
#        sudo ufw deny 7777
# ============================================================================
services:
  jarvis:
    environment:
      JARVIS_SECURE_COOKIE: "1"   # truy cập qua Caddy = HTTPS đầu-cuối → bật cookie Secure

  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped
    depends_on:
      - jarvis
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from ${DOMAIN:?Đặt DOMAIN=ten-mien-cua-ban} --to jarvis:7777
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:

# ============================================================================
# Auto-HTTPS bằng Caddy + Let's Encrypt (ON-DEMAND TLS) - cho VPS Docker mở cổng 80/443.
#
# KHÁC bản cũ: KHÔNG cần đặt DOMAIN lúc chạy. Bạn nhập tên miền NGAY TRONG APP
#   (⚙ Cài đặt → Tên miền riêng). Caddy hỏi backend /tls-check rồi tự xin chứng chỉ cho
#   ĐÚNG tên miền đó ở request đầu tiên → không kẻ nào trỏ DNS bừa vào IP ép ta xin cert được.
#
#   1) Chạy:  docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
#   2) Mở http://<ip-vps>:7777 → ⚙ Cài đặt → Tên miền riêng → nhập tên miền → Lưu.
#   3) Trỏ DNS (bản ghi A: ten-mien → <ip-vps>) theo hướng dẫn hiện trong app.
#   4) Mở https://ten-mien-cua-ban → chứng chỉ tự cấp + tự gia hạn. Xong.
#
# (KHÔNG dùng cho Hostinger Docker Manager: cổng 80/443 đã bị proxy Hostinger chiếm →
#  dùng SSL sẵn của Hostinger, xem DEPLOY.md.)
# Cần Docker Compose v2.23.1+ (hỗ trợ configs.content). Kiểm tra: docker compose version
# ============================================================================
configs:
  striver_caddyfile:
    content: |
      {
        on_demand_tls {
          ask http://striver:7777/tls-check
        }
      }
      https:// {
        tls {
          on_demand
        }
        reverse_proxy striver:7777
      }
      http:// {
        redir https://{host}{uri}
      }

services:
  # Backend giữ nguyên; cookie Secure tự bật khi Host khớp tên miền (server tự xử, không cần env).
  caddy:
    image: caddy:2-alpine
    container_name: striver-caddy
    restart: unless-stopped
    depends_on:
      - striver
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: striver_caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy-data:/data       # chứng chỉ đã cấp - giữ qua restart, không xin lại
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:

# ============================================================================
# Jarvis OS — docker compose (PRODUCTION: pull image dựng sẵn từ GHCR)
#
# CÀI 1-CLICK TRÊN HOSTINGER:
#   VPS → Docker Manager → Compose → URL → dán:
#   https://raw.githubusercontent.com/blogminhquy/jarvis-os/main/docker-compose.yml
#   → Deploy. Hostinger tự pull image + cấp URL https://<app>.<vps>.hstgr.cloud
#   (image GHCR phải để PUBLIC: GitHub → Packages → jarvis-os → Package settings → Public)
#
# CÀI TRÊN VPS BẤT KỲ:
#   1) docker compose run --rm jarvis claude auth login --claudeai   # ĐĂNG NHẬP CLAUDE 1 LẦN
#   2) docker compose up -d
#
# ⚠️ BẢO MẬT: chạy public (0.0.0.0) tự BẬT JARVIS_REQUIRE_LOGIN → mở app ra là màn TẠO TÀI KHOẢN
#    / ĐĂNG NHẬP, không ai vào điều khiển Claude được khi chưa có mật khẩu.
#
# Muốn build từ source thay vì pull image:  docker compose -f docker-compose.build.yml up -d --build
# ============================================================================
services:
  jarvis:
    image: ghcr.io/blogminhquy/jarvis-os:latest
    container_name: jarvis
    restart: unless-stopped
    pull_policy: always
    environment:
      JARVIS_HOST: 0.0.0.0
      JARVIS_PORT: "7777"
      JARVIS_REQUIRE_LOGIN: "1"     # ÉP đăng nhập/đăng ký khi mở app (public)
      JARVIS_STATE_DIR: /data/state
      BRAIN_PATH: /data/brain
      OBSIDIAN_VAULT_PATH: /data/vault
      CLAUDE_CWD: /app
    ports:
      - "7777:7777"                 # Hostinger proxy / VPS map vào cổng này → cấp URL công khai
    volumes:
      - jarvis-data:/data                       # brain/, vault/, state/ (settings, sessions, loop)
      - claude-auth:/home/jarvis/.claude        # token đăng nhập Claude (giữ qua mọi update!)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.getenv('JARVIS_PORT','7777')+'/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  # (Tùy chọn, cho VPS KHÔNG phải Hostinger) Cloudflare Tunnel → URL HTTPS, không cần mở port:
  #   docker compose --profile tunnel up -d  &&  docker compose logs tunnel | grep trycloudflare
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: jarvis-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      - jarvis
    command: tunnel --no-autoupdate --url http://jarvis:7777
    # URL cố định: tạo named tunnel ở Cloudflare Zero Trust → TUNNEL_TOKEN env → đổi command thành:
    #   command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

volumes:
  jarvis-data:
  claude-auth:
